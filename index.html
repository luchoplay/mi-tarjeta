<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mi Tarjeta">
<title>Mi Tarjeta Personal</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0eee8;--muted:#8a8a9a;--accent:#c8a96e;--accent2:#e8c98e;
  --danger:#c0392b;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;min-height:100vh;}
.screen.active{display:flex;}

/* ── TARJETA SCREEN ── */
.hero{width:100%;background:var(--surface);border-bottom:0.5px solid var(--border);padding:3rem 2rem 2rem;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:300px;height:300px;background:radial-gradient(circle,rgba(200,169,110,0.12) 0%,transparent 70%);pointer-events:none;}
.avatar-wrap{position:relative;margin-bottom:1.25rem;}
.avatar{width:96px;height:96px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:2.2rem;color:var(--accent);background:var(--surface2);letter-spacing:-1px;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.avatar-ring{position:absolute;inset:-6px;border-radius:50%;border:0.5px solid rgba(200,169,110,0.25);animation:spin 12s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.card-name{font-family:'DM Serif Display',serif;font-size:1.75rem;letter-spacing:-0.5px;color:var(--text);text-align:center;line-height:1.1;}
.card-name em{font-style:italic;color:var(--accent);}
.card-role{margin-top:.35rem;font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);text-align:center;}
.card-company{margin-top:.2rem;font-size:.85rem;color:var(--accent);text-align:center;font-weight:400;}
.content{width:100%;max-width:420px;margin:0 auto;padding:1.5rem 1.5rem 8rem;display:flex;flex-direction:column;gap:.6rem;}
.section-label{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);padding:.75rem 0 .25rem;opacity:.7;}
.contact-row{display:flex;align-items:center;gap:1rem;padding:.9rem 1rem;background:var(--surface);border:0.5px solid var(--border);border-radius:12px;text-decoration:none;color:var(--text);transition:background .18s;cursor:pointer;}
.contact-row:active{background:var(--surface2);}
.row-icon{width:38px;height:38px;border-radius:10px;background:var(--surface2);border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.row-icon svg{width:16px;height:16px;stroke:var(--accent);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.row-text{flex:1;min-width:0;}
.row-label{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.15rem;}
.row-value{font-size:.9rem;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-arrow{color:var(--muted);font-size:.8rem;flex-shrink:0;}
.social-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}
.social-btn{display:flex;align-items:center;gap:.6rem;padding:.75rem .9rem;background:var(--surface);border:0.5px solid var(--border);border-radius:12px;text-decoration:none;color:var(--text);font-size:.85rem;font-weight:400;transition:background .18s;cursor:pointer;}
.social-btn:active{background:var(--surface2);}
.social-btn svg{width:16px;height:16px;stroke:var(--accent);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.address-row{display:flex;align-items:flex-start;gap:1rem;padding:.9rem 1rem;background:var(--surface);border:0.5px solid var(--border);border-radius:12px;}
.address-text{font-size:.88rem;line-height:1.5;}
.share-bar{position:fixed;bottom:0;left:0;right:0;padding:1rem 1.5rem 1.5rem;background:linear-gradient(to top,var(--bg) 60%,transparent);display:flex;gap:.75rem;}
.btn-share{flex:1;display:flex;align-items:center;justify-content:center;gap:.6rem;padding:.9rem 1.5rem;background:var(--accent);color:#0a0a0f;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;border:none;border-radius:14px;cursor:pointer;transition:opacity .15s,transform .1s;}
.btn-share:active{opacity:.85;transform:scale(.98);}
.btn-share svg{width:18px;height:18px;stroke:#0a0a0f;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.btn-vcf{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.9rem 1.1rem;background:var(--surface);border:0.5px solid var(--border2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:400;border-radius:14px;cursor:pointer;transition:background .15s;white-space:nowrap;}
.btn-vcf:active{background:var(--surface2);}
.btn-vcf svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.fab-edit{position:fixed;top:1rem;right:1rem;width:42px;height:42px;border-radius:50%;background:var(--surface2);border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;}
.fab-edit svg{width:17px;height:17px;stroke:var(--accent);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}

/* ── EDITOR SCREEN ── */
.editor-header{background:var(--surface);border-bottom:0.5px solid var(--border);padding:1.25rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.editor-title{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--accent);}
.btn-back{display:flex;align-items:center;gap:.4rem;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.85rem;cursor:pointer;padding:.4rem .7rem;border-radius:8px;}
.btn-back:active{background:var(--surface2);}
.btn-back svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.btn-save{background:var(--accent);color:#0a0a0f;border:none;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;padding:.5rem 1.1rem;border-radius:10px;cursor:pointer;}
.editor-body{flex:1;padding:1.5rem;display:flex;flex-direction:column;gap:1.5rem;max-width:420px;margin:0 auto;width:100%;}
.field-group{display:flex;flex-direction:column;gap:.5rem;}
.field-group label{font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);}
.field-group input,.field-group textarea{background:var(--surface);border:0.5px solid var(--border2);border-radius:10px;padding:.75rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:300;width:100%;outline:none;transition:border-color .2s;}
.field-group input:focus,.field-group textarea:focus{border-color:var(--accent);}
.field-group textarea{resize:vertical;min-height:70px;line-height:1.5;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
.section-sep{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);opacity:.7;padding-top:.5rem;border-top:0.5px solid var(--border);}
.foto-row{display:flex;align-items:center;gap:1rem;}
.avatar-preview{width:52px;height:52px;border-radius:50%;background:var(--surface2);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--accent);overflow:hidden;flex-shrink:0;}
.avatar-preview img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.foto-input-wrap{flex:1;}
.editor-footer{height:2rem;}

/* ── BIENVENIDA ── */
.welcome-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;gap:1.5rem;}
.welcome-icon{width:80px;height:80px;border-radius:50%;background:var(--surface);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;}
.welcome-icon svg{width:36px;height:36px;stroke:var(--accent);fill:none;stroke-width:1.2;stroke-linecap:round;stroke-linejoin:round;}
.welcome-title{font-family:'DM Serif Display',serif;font-size:1.8rem;line-height:1.1;}
.welcome-title em{font-style:italic;color:var(--accent);}
.welcome-sub{font-size:.9rem;color:var(--muted);line-height:1.6;max-width:280px;}
.btn-start{display:flex;align-items:center;gap:.6rem;padding:1rem 2rem;background:var(--accent);color:#0a0a0f;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:500;border:none;border-radius:14px;cursor:pointer;margin-top:.5rem;}

/* ── TOAST ── */
.toast{position:fixed;top:1.5rem;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--surface2);border:0.5px solid var(--border2);color:var(--text);padding:.6rem 1.2rem;border-radius:99px;font-size:.85rem;white-space:nowrap;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:200;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* hidden rows */
.hide{display:none!important;}
</style>
</head>
<body>

<!-- ══ BIENVENIDA (primera vez) ══ -->
<div id="screenWelcome" class="welcome-screen">
  <div class="welcome-icon">
    <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><circle cx="12" cy="10" r="3"/></svg>
  </div>
  <h1 class="welcome-title">Tu tarjeta<br><em>personal</em></h1>
  <p class="welcome-sub">Cargá tus datos una sola vez y compartí tu contacto por WhatsApp cuando quieras.</p>
  <button class="btn-start" onclick="irEditor(true)">
    <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#0a0a0f;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
    Cargar mis datos
  </button>
</div>

<!-- ══ TARJETA ══ -->
<div id="screenCard" class="screen">
  <button class="fab-edit" onclick="irEditor(false)" title="Editar datos">
    <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
  </button>

  <div class="hero">
    <div class="avatar-wrap">
      <div class="avatar" id="cardAvatar"></div>
      <div class="avatar-ring"></div>
    </div>
    <h1 class="card-name" id="cardName"></h1>
    <p class="card-role" id="cardRole"></p>
    <p class="card-company" id="cardCompany"></p>
  </div>

  <div class="content">
    <p class="section-label">Contacto</p>
    <a class="contact-row" id="rowTel" href="#">
      <div class="row-icon"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013 6.18 2 2 0 015.05 4h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L9.09 11.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg></div>
      <div class="row-text"><div class="row-label">Teléfono</div><div class="row-value" id="cardTel"></div></div>
      <div class="row-arrow">›</div>
    </a>
    <a class="contact-row" id="rowWa" href="#" target="_blank">
      <div class="row-icon"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg></div>
      <div class="row-text"><div class="row-label">WhatsApp</div><div class="row-value" id="cardWa"></div></div>
      <div class="row-arrow">›</div>
    </a>
    <a class="contact-row" id="rowEmail" href="#">
      <div class="row-icon"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
      <div class="row-text"><div class="row-label">Email</div><div class="row-value" id="cardEmail"></div></div>
      <div class="row-arrow">›</div>
    </a>
    <a class="contact-row" id="rowWeb" href="#" target="_blank">
      <div class="row-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg></div>
      <div class="row-text"><div class="row-label">Sitio web</div><div class="row-value" id="cardWeb"></div></div>
      <div class="row-arrow">›</div>
    </a>

    <p class="section-label" id="labelDir">Dirección</p>
    <div class="address-row" id="rowDir">
      <div class="row-icon"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
      <div class="address-text" id="cardDir"></div>
    </div>

    <p class="section-label" id="labelSocial">Redes sociales</p>
    <div class="social-grid" id="socialGrid"></div>
  </div>

  <div class="share-bar">
    <button class="btn-vcf" onclick="downloadVCF()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Guardar contacto
    </button>
    <button class="btn-share" onclick="shareCard()">
      <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Compartir tarjeta
    </button>
  </div>
</div>

<!-- ══ EDITOR ══ -->
<div id="screenEditor" class="screen">
  <div class="editor-header">
    <button class="btn-back" onclick="irTarjeta()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Volver
    </button>
    <span class="editor-title">Mis datos</span>
    <button class="btn-save" onclick="guardarDatos()">Guardar</button>
  </div>

  <div class="editor-body">

    <div class="field-group">
      <label>Foto de perfil (URL)</label>
      <div class="foto-row">
        <div class="avatar-preview" id="previewAvatar"></div>
        <div class="foto-input-wrap">
          <input type="url" id="fFoto" placeholder="https://..." oninput="previewFoto()">
        </div>
      </div>
    </div>

    <div class="field-row">
      <div class="field-group">
        <label>Nombre</label>
        <input type="text" id="fNombre" placeholder="Juan">
      </div>
      <div class="field-group">
        <label>Apellido</label>
        <input type="text" id="fApellido" placeholder="Díaz">
      </div>
    </div>

    <div class="field-group">
      <label>Cargo / Profesión</label>
      <input type="text" id="fCargo" placeholder="Diseñador & Desarrollador">
    </div>

    <div class="field-group">
      <label>Empresa</label>
      <input type="text" id="fEmpresa" placeholder="Estudio Creativo">
    </div>

    <p class="section-sep">Contacto</p>

    <div class="field-group">
      <label>Teléfono / WhatsApp</label>
      <input type="tel" id="fTel" placeholder="+598 91 234 567">
    </div>

    <div class="field-group">
      <label>Email</label>
      <input type="email" id="fEmail" placeholder="tu@email.com">
    </div>

    <div class="field-group">
      <label>Sitio web</label>
      <input type="url" id="fWeb" placeholder="https://tuwebsite.com">
    </div>

    <div class="field-group">
      <label>Dirección</label>
      <textarea id="fDir" placeholder="Av. 18 de Julio 1234&#10;Montevideo, Uruguay"></textarea>
    </div>

    <p class="section-sep">Redes sociales (opcional)</p>

    <div class="field-group">
      <label>Instagram</label>
      <input type="url" id="fIg" placeholder="https://instagram.com/usuario">
    </div>
    <div class="field-group">
      <label>LinkedIn</label>
      <input type="url" id="fLi" placeholder="https://linkedin.com/in/usuario">
    </div>
    <div class="field-group">
      <label>Twitter / X</label>
      <input type="url" id="fTw" placeholder="https://twitter.com/usuario">
    </div>
    <div class="field-group">
      <label>GitHub</label>
      <input type="url" id="fGh" placeholder="https://github.com/usuario">
    </div>

    <div class="editor-footer"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── STORAGE ──
function cargar() {
  try { return JSON.parse(localStorage.getItem('tarjeta') || 'null'); } catch(e) { return null; }
}
function guardar(d) {
  localStorage.setItem('tarjeta', JSON.stringify(d));
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── NAVEGACIÓN ──
function mostrar(id) {
  ['screenWelcome','screenCard','screenEditor'].forEach(s => {
    const el = document.getElementById(s);
    if(el) { el.style.display = s === id ? 'flex' : 'none'; }
  });
}

function irEditor(bienvenida) {
  const d = cargar();
  if(d) rellenarEditor(d);
  mostrar('screenEditor');
}

function irTarjeta() {
  const d = cargar();
  if(!d) { mostrar('screenWelcome'); return; }
  renderTarjeta(d);
  mostrar('screenCard');
}

// ── GUARDAR DATOS ──
function guardarDatos() {
  const nombre = document.getElementById('fNombre').value.trim();
  if(!nombre) { showToast('Escribí tu nombre'); return; }

  const d = {
    nombre,
    apellido: document.getElementById('fApellido').value.trim(),
    cargo: document.getElementById('fCargo').value.trim(),
    empresa: document.getElementById('fEmpresa').value.trim(),
    tel: document.getElementById('fTel').value.trim(),
    email: document.getElementById('fEmail').value.trim(),
    web: document.getElementById('fWeb').value.trim(),
    dir: document.getElementById('fDir').value.trim(),
    ig: document.getElementById('fIg').value.trim(),
    li: document.getElementById('fLi').value.trim(),
    tw: document.getElementById('fTw').value.trim(),
    gh: document.getElementById('fGh').value.trim(),
    foto: document.getElementById('fFoto').value.trim(),
  };
  guardar(d);
  renderTarjeta(d);
  mostrar('screenCard');
  showToast('Datos guardados ✓');
}

// ── RELLENAR EDITOR ──
function rellenarEditor(d) {
  document.getElementById('fNombre').value = d.nombre || '';
  document.getElementById('fApellido').value = d.apellido || '';
  document.getElementById('fCargo').value = d.cargo || '';
  document.getElementById('fEmpresa').value = d.empresa || '';
  document.getElementById('fTel').value = d.tel || '';
  document.getElementById('fEmail').value = d.email || '';
  document.getElementById('fWeb').value = d.web || '';
  document.getElementById('fDir').value = d.dir || '';
  document.getElementById('fIg').value = d.ig || '';
  document.getElementById('fLi').value = d.li || '';
  document.getElementById('fTw').value = d.tw || '';
  document.getElementById('fGh').value = d.gh || '';
  document.getElementById('fFoto').value = d.foto || '';
  previewFoto();
}

// ── PREVIEW FOTO EN EDITOR ──
function previewFoto() {
  const url = document.getElementById('fFoto').value.trim();
  const prev = document.getElementById('previewAvatar');
  const nombre = document.getElementById('fNombre').value.trim();
  const apellido = document.getElementById('fApellido').value.trim();
  const iniciales = ((nombre[0]||'') + (apellido[0]||'')).toUpperCase() || '?';
  if(url) {
    prev.innerHTML = '<img src="'+url+'" onerror="this.parentElement.textContent=\''+iniciales+'\'">';
  } else {
    prev.textContent = iniciales;
  }
}

// ── RENDER TARJETA ──
function renderTarjeta(d) {
  const nombre = d.nombre || '';
  const apellido = d.apellido || '';
  const nombreCompleto = (nombre + ' ' + apellido).trim();
  const iniciales = ((nombre[0]||'') + (apellido[0]||'')).toUpperCase();

  // Avatar
  const av = document.getElementById('cardAvatar');
  if(d.foto) {
    av.innerHTML = '<img src="'+d.foto+'" onerror="this.parentElement.textContent=\''+iniciales+'\'">';
  } else {
    av.textContent = iniciales;
  }

  // Nombre con apellido en cursiva
  const nameEl = document.getElementById('cardName');
  if(apellido) {
    nameEl.innerHTML = nombre + ' <em>' + apellido + '</em>';
  } else {
    nameEl.textContent = nombre;
  }

  document.getElementById('cardRole').textContent = d.cargo || '';
  document.getElementById('cardCompany').textContent = d.empresa || '';

  // Teléfono
  const rowTel = document.getElementById('rowTel');
  if(d.tel) {
    rowTel.href = 'tel:' + d.tel.replace(/\s/g,'');
    document.getElementById('cardTel').textContent = d.tel;
    rowTel.classList.remove('hide');
  } else rowTel.classList.add('hide');

  // WhatsApp
  const rowWa = document.getElementById('rowWa');
  if(d.tel) {
    rowWa.href = 'https://wa.me/' + d.tel.replace(/[\s+]/g,'');
    document.getElementById('cardWa').textContent = d.tel;
    rowWa.classList.remove('hide');
  } else rowWa.classList.add('hide');

  // Email
  const rowEmail = document.getElementById('rowEmail');
  if(d.email) {
    rowEmail.href = 'mailto:' + d.email;
    document.getElementById('cardEmail').textContent = d.email;
    rowEmail.classList.remove('hide');
  } else rowEmail.classList.add('hide');

  // Web
  const rowWeb = document.getElementById('rowWeb');
  if(d.web) {
    rowWeb.href = d.web;
    document.getElementById('cardWeb').textContent = d.web.replace(/^https?:\/\//,'');
    rowWeb.classList.remove('hide');
  } else rowWeb.classList.add('hide');

  // Dirección
  const rowDir = document.getElementById('rowDir');
  const labelDir = document.getElementById('labelDir');
  if(d.dir) {
    document.getElementById('cardDir').innerHTML = d.dir.replace(/\n/g,'<br>');
    rowDir.classList.remove('hide');
    labelDir.classList.remove('hide');
  } else {
    rowDir.classList.add('hide');
    labelDir.classList.add('hide');
  }

  // Redes sociales
  const grid = document.getElementById('socialGrid');
  const labelSocial = document.getElementById('labelSocial');
  const redes = [
    { key: d.ig, label: 'Instagram', icon: '<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>' },
    { key: d.li, label: 'LinkedIn', icon: '<svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>' },
    { key: d.tw, label: 'Twitter / X', icon: '<svg viewBox="0 0 24 24"><path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"/></svg>' },
    { key: d.gh, label: 'GitHub', icon: '<svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/></svg>' },
  ].filter(r => r.key);

  if(redes.length) {
    grid.innerHTML = redes.map(r =>
      '<a class="social-btn" href="'+r.key+'" target="_blank">'+r.icon+r.label+'</a>'
    ).join('');
    grid.classList.remove('hide');
    labelSocial.classList.remove('hide');
  } else {
    grid.classList.add('hide');
    labelSocial.classList.add('hide');
  }
}

// ── VCF ──
function downloadVCF() {
  const d = cargar(); if(!d) return;
  const nombre = (d.nombre + ' ' + (d.apellido||'')).trim();
  const vcf = [
    'BEGIN:VCARD','VERSION:3.0',
    'FN:' + nombre,
    d.apellido ? 'N:' + d.apellido + ';' + d.nombre + ';;;' : 'N:' + d.nombre + ';;;;',
    d.cargo ? 'TITLE:' + d.cargo : '',
    d.empresa ? 'ORG:' + d.empresa : '',
    d.tel ? 'TEL;TYPE=CELL:' + d.tel.replace(/\s/g,'') : '',
    d.email ? 'EMAIL:' + d.email : '',
    d.web ? 'URL:' + d.web : '',
    d.dir ? 'ADR;TYPE=WORK:;;' + d.dir.replace(/\n/g,';') + ';;;' : '',
    d.ig ? 'X-SOCIALPROFILE;type=instagram:' + d.ig : '',
    d.li ? 'X-SOCIALPROFILE;type=linkedin:' + d.li : '',
    'END:VCARD'
  ].filter(Boolean).join('\r\n');

  const blob = new Blob([vcf], { type: 'text/vcard' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = nombre.replace(/\s/g,'_') + '.vcf';
  a.click(); URL.revokeObjectURL(url);
  showToast('Contacto listo para guardar ✓');
}

// ── COMPARTIR ──
async function shareCard() {
  const d = cargar(); if(!d) return;
  const nombre = (d.nombre + ' ' + (d.apellido||'')).trim();
  const lineas = [
    '👤 ' + nombre,
    d.cargo && d.empresa ? '💼 ' + d.cargo + ' · ' + d.empresa : (d.cargo || d.empresa ? '💼 ' + (d.cargo || d.empresa) : ''),
    d.tel ? '📞 ' + d.tel : '',
    d.email ? '📧 ' + d.email : '',
    d.web ? '🌐 ' + d.web.replace(/^https?:\/\//,'') : '',
  ].filter(Boolean).join('\n');

  if(navigator.share) {
    try { await navigator.share({ title: nombre, text: lineas }); return; }
    catch(e) { if(e.name === 'AbortError') return; }
  }
  navigator.clipboard.writeText(lineas).then(() => showToast('Copiado al portapapeles ✓')).catch(() => showToast('Compartí el texto manualmente'));
}

// ── INICIO ──
window.addEventListener('DOMContentLoaded', () => {
  const d = cargar();
  if(d && d.nombre) {
    renderTarjeta(d);
    mostrar('screenCard');
  } else {
    mostrar('screenWelcome');
  }
});
